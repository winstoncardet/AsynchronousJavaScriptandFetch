<!DOCTYPE html>
<html>
<head>
<title>Pokemon Team Builder</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h2>Name or ID</h2>

<input id="pokemonInput" type="text">
<button onclick="findPokemon()">Find</button>

<div id="pokemonDisplay">

<img id="pokemonImage">

<audio id="pokemonAudio" controls></audio>

<div class="moves">
<select id="move1"></select>
<select id="move2"></select>
<select id="move3"></select>
<select id="move4"></select>
</div>

<button onclick="addToTeam()">Add to Team</button>

</div>

<h3>Your Team</h3>

<div id="team"></div>

<script src="script.js"></script>

</body>
</html>

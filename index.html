<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Team Builder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="page">
    <div class="card">
      <h2 class="title">Name or ID</h2>

      <div class="searchRow">
        <input id="pokemonInput" type="text" />
        <button id="findBtn" type="button">Find</button>
      </div>

      <img id="pokemonImage" alt="" />

      <audio id="pokemonAudio" controls></audio>

      <div class="movesGrid">
        <select id="move1"></select>
        <select id="move2"></select>
        <select id="move3"></select>
        <select id="move4"></select>
      </div>

      <button id="addBtn" type="button">Add to Team</button>

      <div id="teamBox" class="teamBox"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
